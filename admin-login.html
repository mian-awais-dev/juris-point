<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login – Juris Point</title>
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div id="navbar-placeholder"></div>

    <div class="auth-page">
        <div class="auth-card" style="border-top-color: var(--primary-medium);">
            <div class="auth-header">
                <div class="logo-container" style="justify-content:center;">
                    <img src="assets/images/logo.png" alt="Juris Point Logo" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="logo-fallback" style="display:none; color:var(--primary-dark);">
                        <i class="fas fa-balance-scale" style="color:var(--primary-medium);"></i> <span>JURIS</span> POINT
                    </div>
                </div>
                <h2 style="color: var(--primary-medium);">Admin Portal</h2>
                <p>Secure administrative access node. Logs audited.</p>
            </div>

            <!-- Errors/Success Alert -->
            <div id="alert-box" class="alert"></div>

            <form id="admin-login-form" onsubmit="event.preventDefault(); handleAdminLogin();">
                <div class="form-group">
                    <label for="email">Admin Email</label>
                    <input type="email" id="email" class="form-control" placeholder="admin@jurispoint.com" required>
                </div>
                <div class="form-group" style="margin-bottom: 24px;">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Admin password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Authorize Access</button>
            </form>

            <div class="auth-footer">
                Student? <a href="student-login.html">Student Login here</a>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="js/firebase-config.js"></script>
    <script src="js/components.js"></script>
    <script src="js/auth.js"></script>
    <script>
        function handleAdminLogin() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            loginAdmin(email, pass);
        }
    </script>
</body>
</html>
