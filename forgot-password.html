<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password – Juris Point</title>
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div id="navbar-placeholder"></div>

    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-container" style="justify-content:center;">
                    <img src="assets/images/logo.png" alt="Juris Point Logo" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="logo-fallback" style="display:none; color:var(--primary-dark);">
                        <i class="fas fa-balance-scale" style="color:var(--accent-gold);"></i> <span>JURIS</span> POINT
                    </div>
                </div>
                <h2>Reset Password</h2>
                <p>Provide your email address to receive password instructions.</p>
            </div>

            <!-- Errors/Success Alert -->
            <div id="alert-box" class="alert"></div>

            <form id="reset-form" onsubmit="event.preventDefault(); handleReset();">
                <div class="form-group" style="margin-bottom: 24px;">
                    <label for="email">Registered Email</label>
                    <input type="email" id="email" class="form-control" placeholder="e.g. user@email.com" required>
                </div>
                <button type="submit" class="btn btn-gold" style="width: 100%;">Send Instructions</button>
            </form>

            <div class="auth-footer">
                Remember your password? <a href="student-login.html">Login here</a>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="js/firebase-config.js"></script>
    <script src="js/components.js"></script>
    <script src="js/auth.js"></script>
    <script>
        function handleReset() {
            const email = document.getElementById('email').value;
            resetPassword(email);
        }
    </script>
</body>
</html>
